name: Fetch LeetCode Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and update JSON
        run: |
          get_stat() {
            echo "$1" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            nums=d['data']['matchedUser']['submitStats']['acSubmissionNum']
            val=next((x['count'] for x in nums if x['difficulty']=='$2'),0)
            print(val)
          except:
            print(0)
          " 2>/dev/null || echo 0
          }

          fetch_user() {
            U=$1
            R=$(curl -s -X POST https://leetcode.com/graphql \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0" \
              -d '{"query":"query($u:String!){matchedUser(username:$u){submitStats{acSubmissionNum{difficulty count}}}}","variables":{"u":"'"$U"'"}}')
            E=$(get_stat "$R" "Easy")
            M=$(get_stat "$R" "Medium")
            H=$(get_stat "$R" "Hard")
            T=$(get_stat "$R" "All")
            echo "{\"username\":\"$U\",\"easy\":$E,\"medium\":$M,\"hard\":$H,\"total\":$T}"
          }

          P1=$(fetch_user "Road_to_500")
          P2=$(fetch_user "mahijoshii")
          P3=$(fetch_user "kiacoder123")
          P4=$(fetch_user "Leet_samiksha")
          P5=$(fetch_user "SortBhardwaj")
          P6=$(fetch_user "kumarvishwansh")
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > data/stats.json << JSONEOF
          {
            "lastUpdated": "$TS",
            "players": [
              $P1,
              $P2,
              $P3,
              $P4,
              $P5,
              $P6
            ]
          }
          JSONEOF

          python3 -c "import json; json.load(open('data/stats.json'))" && echo "JSON valid"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git commit -m "chore: update stats $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "nothing to commit"
          git push
