name: Fetch LeetCode Stats
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write fetch script
        run: |
          cat > /tmp/fetch.py << 'PYEOF'
          import json, subprocess, sys, datetime

          USERNAMES = [
              "Road_to_500", "mahijoshii", "kiacoder123",
              "Leet_samiksha", "SortBhardwaj", "kumarvishwansh",
          ]

          HEADERS = ["-H", "Content-Type: application/json", "-H", "User-Agent: Mozilla/5.0"]

          def graphql(query, variables):
              payload = json.dumps({"query": query, "variables": variables})
              r = subprocess.run(
                  ["curl", "-s", "-X", "POST", "https://leetcode.com/graphql"] + HEADERS + ["-d", payload],
                  capture_output=True, text=True, timeout=30
              )
              return json.loads(r.stdout)

          Q_STATS = "query($u:String!){matchedUser(username:$u){submitStats{acSubmissionNum{difficulty count}}}}"
          Q_CAL   = "query($u:String!){matchedUser(username:$u){userCalendar{submissionCalendar streak totalActiveDays}}}"

          players = []
          for u in USERNAMES:
              print(f"Fetching {u}...")
              try:
                  r1   = graphql(Q_STATS, {"u": u})
                  nums = r1["data"]["matchedUser"]["submitStats"]["acSubmissionNum"]
                  easy   = next((x["count"] for x in nums if x["difficulty"]=="Easy"),   0)
                  medium = next((x["count"] for x in nums if x["difficulty"]=="Medium"), 0)
                  hard   = next((x["count"] for x in nums if x["difficulty"]=="Hard"),   0)
                  total  = next((x["count"] for x in nums if x["difficulty"]=="All"),    0)
              except Exception as e:
                  print(f"  stats error: {e}"); easy=medium=hard=total=0

              try:
                  r2       = graphql(Q_CAL, {"u": u})
                  cd       = r2["data"]["matchedUser"]["userCalendar"]
                  calendar = json.loads(cd["submissionCalendar"] or "{}")
                  streak   = cd.get("streak", 0)
                  active   = cd.get("totalActiveDays", 0)
              except Exception as e:
                  print(f"  calendar error: {e}"); calendar={}; streak=0; active=0

              players.append({"username":u,"easy":easy,"medium":medium,"hard":hard,
                              "total":total,"streak":streak,"activeDays":active,"calendar":calendar})
              print(f"  total={total} streak={streak}")

          ts  = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          out = {"lastUpdated": ts, "players": players}
          with open("data/stats.json","w") as f:
              json.dump(out, f, indent=2)
          json.load(open("data/stats.json"))
          print("OK")
          PYEOF

      - name: Run fetch script
        run: python3 /tmp/fetch.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git commit -m "chore: update stats $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "nothing to commit"
          git push
